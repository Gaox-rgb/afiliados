<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makumoto® - Centro de Mando</title>
    <link rel="icon" type="image/png" href="imagenes/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet.js para el Mapa de Misión -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        :root {
            --color-primary: #FFD700; --color-secondary: #ff4d4d;
            --color-dark: #101010; --color-light-dark: #1E1E1E;
            --color-text: #E0E0E0; --color-text-dark: #333;
            --font-family: 'Poppins', sans-serif, system-ui;
          }
        @keyframes vibrant-glow {
            0% { text-shadow: 0 0 3px #FFD700, 0 0 5px #FFD700, 0 0 8px #ffae00; }
            50% { text-shadow: 0 0 5px #FFD700, 0 0 10px #ffae00, 0 0 15px #ffae00; }
            100% { text-shadow: 0 0 3px #FFD700, 0 0 5px #FFD700, 0 0 8px #ffae00; }  
        
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--color-dark);
            color: var(--color-text);
            font-family: var(--font-family);
            line-height: 1.4;
            font-size: 14px; /* Base de fuente más pequeña para mayor densidad */
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        header { padding: 0.7rem 0; border-bottom: 1px solid var(--color-primary); }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo img { height: 24px; }
        .logo span { font-size: 1.2rem; font-weight: 600; color: var(--color-primary); }
        
        #manager-portal { padding: 1.5rem 0; }

        .portal-actions-bar {
            display: flex;
            justify-content: center; /* <<< BOTÓN CENTRADO, COMO LO PEDISTE */
            margin-bottom: 1.5rem;
        }
        
        #portal-title {
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center; /* Título centrado para equilibrio */
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }
        #roster-title {
            font-size: 1.4rem;
            font-weight: 500;
            text-align: left;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #333;
        }
        
        #dashboard-kpis { margin-bottom: 2.5rem; }
        .kpi-grid {
            display: grid;
            /* Grid robusto y responsivo para columnas siempre parejas */
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }
        .kpi-card { background-color: #1E1E1E; padding: 1rem; border-radius: 6px; text-align: center; }
        .kpi-card .value { font-size: 1.8rem; font-weight: 700; color: var(--color-primary); }
        .kpi-card .label { font-size: 0.75rem; opacity: 0.7; margin-top: 0.2rem; text-transform: uppercase; }

        .portal-logout-btn { background: var(--color-secondary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        
        .placeholder {
            min-height: 80px;
            background-color: transparent; /* Más sutil */
            border: 1px dashed #444;
            display:flex; align-items:center; justify-content:center;
            border-radius: 8px; color: #666; font-style: italic;
            padding: 1rem;
        }

             /* --- ESTILOS PARA EL FORMULARIO DE INVITACIÓN --- */
        .invite-container {
            background-color: #1a1a1a;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            border-left: 3px solid var(--color-primary);
        }
        #invite-form {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        #invite-form input {
            flex-grow: 1;
            background: #2c2c2c;
            border: 1px solid #444;
            color: var(--color-text);
            padding: 0.6rem 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: var(--font-family);
        }
        #invite-form button {
            background: var(--color-primary);
            color: var(--color-text-dark);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        #invite-form button {
            background: var(--color-primary);
            color: var(--color-text-dark);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* --- ESTILOS PARA LAS FILAS DE MIEMBRO (MOBILE-FIRST) --- */
        .roster-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem; /* Espacio entre miembros */
            margin-top: 1.5rem;
        }
        .member-row {
            background-color: var(--color-light-dark);
            border-radius: 6px;
            padding: 0.8rem 1rem;
            display: grid;
            grid-template-columns: 1fr auto; /* Columna principal y columna de acciones */
            gap: 0.5rem 1rem;
            align-items: center;
        }
        .member-info {
            grid-column: 1 / 2;
        }
        .member-name {
            font-weight: 600;
            color: var(--color-text);
            font-size: 1rem;
        }
        .member-email {
            font-size: 0.8rem;
            color: #999;
        }
        .member-kpi, .member-role {
            grid-row: 2; /* KPI y Rol van en la segunda fila del grid */
            text-align: center;
            background-color: rgba(0,0,0,0.2);
            padding: 0.4rem;
            border-radius: 4px;
        }
        .kpi-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-primary);
            display: block;
        }
        .kpi-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #888;
        }
        .role-selector {
            background-color: transparent;
            color: var(--color-primary);
            border: none;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            padding:0;
        }
        .member-action {
            grid-column: 2 / 3;
            grid-row: 1 / span 2; /* Ocupa ambas filas */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .member-action button {
            background-color: var(--color-secondary);
            color: white;
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }
        .member-action button[disabled] {
            background-color: #555;
            cursor: not-allowed;
            color: #999;
        }

        /* --- ESTILOS PARA EL ARSENAL ESTRATÉGICO (MOBILE-FIRST) --- */
        .power-up-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .power-up-row {
            background-color: var(--color-light-dark);
            border-radius: 6px;
            padding: 1rem;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1rem;
            align-items: center;
            border-left: 3px solid var(--color-primary);
            position: relative;
        }
        .power-up-icon {
            font-size: 1.8rem;
            color: var(--color-primary);
        }
        .power-up-info h3 {
            font-size: 1rem;
            font-weight: 600;
        }
        .power-up-info p {
            font-size: 0.8rem;
            color: #999;
            line-height: 1.4;
        }
        .power-up-action a {
            display: block;
            background: var(--color-secondary);
            color: white;
            text-decoration: none;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .tag-active {
            position: absolute;
            top: 0;
            left: 0;
            background: var(--color-primary);
            color: var(--color-dark);
            padding: 0.1rem 0.5rem;
            font-size: 0.6rem;
            font-weight: bold;
            border-top-left-radius: 6px;
        }

        /* --- ESTILOS PARA EL FOOTER FIJO --- */
        #portal-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--color-dark);
            padding: 1rem;
            text-align: center;
            border-top: 1px solid #333;
            z-index: 1000;
        }
        /* Añadir un padding-bottom al body para evitar que el footer cubra el contenido */
        body {
            padding-bottom: 80px; /* Ajustar este valor según el alto del footer */
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-container">
            <div class="logo">
                <img src="imagenes/logo.png" alt="Makumoto Logo">
                <span id="portal-sector-name" style="animation: vibrant-glow 2s ease-in-out infinite;">MAKUMOTO® AFILIADOS</span>
            </div>
        </div>
    </header>

    <main id="manager-portal" class="container">
        <!-- Este contenedor se elimina por completo -->
        
        <!-- Contenedor Dinámico para el Flujo de Iniciación y Dashboard -->
        <div id="portal-container">
            <!-- El contenido se renderizará aquí vía JS -->
        </div>

    </main>

    <footer id="portal-footer">
        <button id="btn-logout-footer" class="portal-logout-btn">Cerrar Sesión</button>
    </footer>

    <!-- SDKs de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- ===== CONFIGURACIÓN SEGURA DE FIREBASE (NO VERSIONADA) ===== -->
    <script src="js/firebase-config.js"></script>

    <!-- ===== NÚCLEO DEL PORTAL DE MANAGER (SIGUE SIENDO LA VERSIÓN MÍNIMA) ===== -->
    <script src="/js/portal.js"></script>

<!-- =================================================================== -->
<!--     INICIO DEL CHATBOT DE ASISTENCIA PARA GERENTES MAKUMOTO®     -->
<!-- =================================================================== -->
<div id="manager-chatbot-container">
    <div id="manager-chatbot-bubble">
        <i class="fas fa-book-open"></i>
    </div>
    <div id="manager-chatbot-window">
        <div id="manager-chatbot-header">
            <h3>Asistente Táctico</h3>
            <button id="manager-chatbot-close-btn">&times;</button>
        </div>
        <div id="manager-chatbot-messages">
            <!-- Los mensajes se insertarán aquí -->
        </div>
        <div id="manager-chatbot-options">
            <!-- Las opciones de botones se insertarán aquí -->
        </div>
    </div>
</div>

<style>
    #manager-chatbot-container {
        position: fixed;
        bottom: 25px;
        right: 25px;
        z-index: 1001;
    }
    #manager-chatbot-bubble {
        width: 60px;
        height: 60px;
        background: var(--color-primary);
        color: var(--color-dark);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        transition: transform 0.3s ease;
    }
    #manager-chatbot-bubble:hover {
        transform: scale(1.1);
    }
    #manager-chatbot-window {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 350px;
        height: 500px;
        background: var(--color-light-dark);
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid #333;
        transform: scale(0);
        transform-origin: bottom right;
        transition: transform 0.3s ease;
    }
    #manager-chatbot-container.open #manager-chatbot-window {
        transform: scale(1);
    }
    #manager-chatbot-header {
        background: var(--color-dark);
        padding: 15px;
        color: var(--color-primary);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    #manager-chatbot-header h3 { margin: 0; font-size: 1.1rem; }
    #manager-chatbot-close-btn {
        background: none; border: none; color: var(--color-text);
        font-size: 1.8rem; cursor: pointer;
    }
    #manager-chatbot-messages {
        flex-grow: 1;
        padding: 15px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .manager-chat-message {
        padding: 10px 15px;
        border-radius: 20px;
        max-width: 85%;
        line-height: 1.4;
    }
    .manager-bot-message {
        background: #333;
        color: var(--color-text);
        align-self: flex-start;
        border-bottom-left-radius: 5px;
    }
    .manager-user-message {
        background: var(--color-primary);
        color: var(--color-dark);
        align-self: flex-end;
        border-bottom-right-radius: 5px;
    }
    #manager-chatbot-options {
        padding: 15px;
        border-top: 1px solid #333;
        background: var(--color-dark);
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .manager-chatbot-option-btn {
        width: 100%;
        padding: 12px;
        background: transparent;
        border: 2px solid var(--color-primary);
        color: var(--color-primary);
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
        font-family: var(--font-family);
        font-size: 0.9rem;
        font-weight: bold;
        transition: all 0.2s ease;
    }
    .manager-chatbot-option-btn:hover {
        background-color: var(--color-primary);
        color: var(--color-dark);
    }
    .manager-chatbot-action-btn {
        background: var(--color-secondary);
        color: white;
        border-color: var(--color-secondary);
    }
    .manager-chatbot-action-btn:hover {
        background-color: var(--color-secondary);
        color: white;
        filter: brightness(1.2);
    }
    @media (max-width: 480px) {
        #manager-chatbot-window {
            width: calc(100vw - 40px);
            height: 70vh;
            bottom: 80px;
            right: -15px;
        }
    }
</style>

<script>
    // Se envuelve en una función IIFE para evitar conflictos con el script principal del portal
    (function() {
        const initManagerChatbot = () => {
            const chatbotContainer = document.getElementById('manager-chatbot-container');
            const bubble = document.getElementById('manager-chatbot-bubble');
            const closeBtn = document.getElementById('manager-chatbot-close-btn');
            const messagesContainer = document.getElementById('manager-chatbot-messages');
            const optionsContainer = document.getElementById('manager-chatbot-options');
            
            // Verificación para evitar errores si los elementos no existen
            if (!chatbotContainer || !bubble || !closeBtn) return;

            const chatbotData = {
                welcome: { text: "¡Saludos, Gerente! Soy tu asistente táctico. Mi misión es asegurar que domines cada herramienta de este Centro de Mando. ¿Qué necesitas optimizar hoy?" },
                q1: { question: "¿Cómo afilio a un nuevo miembro a mi Tribu?", answer: "Es un proceso en dos pasos: <br>1. Ve a <strong>'Gestión de Altas'</strong> y añade a la persona con un ID único. <br>2. El miembro usa la app Makumoto®, su ID y tu <strong>'Código de Convenio'</strong> para unirse. ¡Es todo!", cta: { text: "Abrir Gestión de Altas", action: () => document.getElementById('btn-show-roster-management').click() } },
                q2: { question: "¿Comunicado masivo o Mensaje Directo?", answer: "Usa la <strong>'Consola de Comunicados'</strong> para mensajes a TODA tu tribu. Ideal para anuncios. <br><br>Usa la <strong>'Bandeja de Mensajes'</strong> para una conversación privada y uno a uno. Perfecto para feedback." },
                q3: { question: "¿Para qué sirve el 'Mapa de Misión'?", answer: "Es tu vista de satélite. Te muestra en un mapa <strong>dónde tus miembros realizan sus 'check-ins'</strong>. Es la prueba visual del engagement de tu tribu en el mundo real." },
                q4: { question: "¿Por qué debería considerar las 'Mejoras Premium'?", answer: "Te dan una <strong>ventaja táctica decisiva</strong>. Son 'Power-Ups' de pago único que desbloquean funciones avanzadas como retos personalizados o analíticas de comportamiento para llevar tu liderazgo al siguiente nivel.", cta: { text: "Explorar Mejoras", action: () => document.getElementById('btn-show-premium-upgrades').click() } },
                q5: { question: "¿Qué son los 'Power-Ups'?", answer: "Son módulos de funcionalidad que puedes añadir a tu arsenal. Por ejemplo, el Power-Up 'Impulso Personalizado' te permite crear micro-retos específicos para un individuo o para toda la tribu, dándote un control granular sobre la motivación del equipo." }
            };

            const showMainMenu = () => {
                optionsContainer.innerHTML = '';
                Object.keys(chatbotData).forEach(key => {
                    if (key.startsWith('q')) {
                        const btn = document.createElement('button');
                        btn.className = 'manager-chatbot-option-btn';
                        btn.textContent = chatbotData[key].question;
                        btn.onclick = () => handleQuestionClick(key);
                        optionsContainer.appendChild(btn);
                    }
                });
            };

            const addMessage = (text, type) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `manager-chat-message ${type}-message`;
                messageDiv.innerHTML = text;
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            };

            const handleQuestionClick = (key) => {
                const data = chatbotData[key];
                addMessage(data.question, 'manager-user');
                optionsContainer.innerHTML = '<p style="text-align:center; opacity: 0.7;">Procesando...</p>';
                setTimeout(() => {
                    addMessage(data.answer, 'manager-bot');
                    optionsContainer.innerHTML = '';
                    const btnBack = document.createElement('button');
                    btnBack.className = 'manager-chatbot-option-btn';
                    btnBack.innerHTML = '<i class="fas fa-arrow-left"></i> Volver al Menú';
                    btnBack.onclick = () => {
                        messagesContainer.innerHTML = '';
                        addMessage(chatbotData.welcome.text, 'manager-bot');
                        showMainMenu();
                    };
                    optionsContainer.appendChild(btnBack);
                    if (data.cta) {
                        const btnAction = document.createElement('button');
                        btnAction.className = 'manager-chatbot-option-btn manager-chatbot-action-btn';
                        btnAction.innerHTML = `<i class="fas fa-crosshairs"></i> ${data.cta.text}`;
                        btnAction.onclick = () => {
                            data.cta.action();
                            toggleChat(false);
                        };
                        optionsContainer.appendChild(btnAction);
                    }
                }, 800);
            };

            const toggleChat = (forceOpen = null) => {
                if (forceOpen === true) chatbotContainer.classList.add('open');
                else if (forceOpen === false) chatbotContainer.classList.remove('open');
                else chatbotContainer.classList.toggle('open');
            };

            bubble.onclick = () => toggleChat();
            closeBtn.onclick = () => toggleChat(false);
            addMessage(chatbotData.welcome.text, 'manager-bot');
            showMainMenu();
        };

        // Espera a que el DOM esté completamente cargado para inicializar.
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initManagerChatbot);
        } else {
            initManagerChatbot();
        }
    })();
</script>
<!-- =================================================================== -->
<!--            FIN DEL CHATBOT DE ASISTENCIA PARA GERENTES           -->
<!-- =================================================================== -->
</body>
</html>
