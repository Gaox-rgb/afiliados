<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makumoto® - Centro de Mando (Prueba Limpia)</title>
    <link rel="icon" type="image/png" href="imagenes/logo.png">
    <style>
        /* --- ESTILOS MÍNIMOS E INDISPENSABLES --- */
        :root {
            --color-primary: #FFD700;
            --color-secondary: #ff4d4d;
            --color-dark: #101010;
            --color-light-dark: #1E1E1E;
            --color-text: #E0E0E0;
        }
        body {
            background-color: var(--color-dark);
            color: var(--color-text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            padding: 15px 0;
            border-bottom: 2px solid var(--color-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #portal-title {
            color: var(--color-primary);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .kpi-card {
            background-color: var(--color-light-dark);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .kpi-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--color-primary);
        }
        .kpi-card .label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }
        #btn-logout {
             background: var(--color-secondary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <span id="portal-sector-name">MAKUMOTO®</span>
            <button id="btn-logout">Cerrar Sesión</button>
        </div>
    </header>

    <main id="manager-portal" class="container">
        <h1 id="portal-title">Cargando Centro de Mando...</h1>
        
        <section id="dashboard-kpis">
            <div class="kpi-grid">
                <!-- El JavaScript pintará el contenido aquí -->
            </div>
        </section>
    </main>

    <!-- SDKs de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- ===== CONFIGURACIÓN SEGURA DE FIREBASE (NO VERSIONADA) ===== -->
    <script src="js/firebase-config.js"></script>

    <!-- ===== NÚCLEO DEL PORTAL DE MANAGER ===== -->
    <script src="js/portal.js"></script>

</body>
</html>
