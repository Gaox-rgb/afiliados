<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makumoto® - Centro de Mando</title>
    <link rel="icon" type="image/png" href="imagenes/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-primary: #FFD700; --color-secondary: #ff4d4d;
            --color-dark: #101010; --color-light-dark: #1E1E1E;
            --color-text: #E0E0E0; --color-text-dark: #333;
            --font-family: 'Poppins', sans-serif, system-ui;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--color-dark);
            color: var(--color-text);
            font-family: var(--font-family);
            line-height: 1.4;
            font-size: 14px; /* Base de fuente más pequeña para mayor densidad */
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        header { padding: 0.7rem 0; border-bottom: 1px solid var(--color-primary); }
        .header-container { display: flex; align-items: center; gap: 10px; }
        .logo img { height: 24px; }
        .logo span { font-size: 0.9rem; font-weight: 500; color: var(--color-primary); }
        
        #manager-portal { padding: 1.5rem 0; }

        .portal-actions-bar {
            display: flex;
            justify-content: center; /* <<< BOTÓN CENTRADO, COMO LO PEDISTE */
            margin-bottom: 1.5rem;
        }
        
        #portal-title {
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center; /* Título centrado para equilibrio */
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }
        #roster-title {
            font-size: 1.4rem;
            font-weight: 500;
            text-align: left;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #333;
        }
        
        #dashboard-kpis { margin-bottom: 2.5rem; }
        .kpi-grid {
            display: grid;
            /* Grid robusto y responsivo para columnas siempre parejas */
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }
        .kpi-card { background-color: #1E1E1E; padding: 1rem; border-radius: 6px; text-align: center; }
        .kpi-card .value { font-size: 1.8rem; font-weight: 700; color: var(--color-primary); }
        .kpi-card .label { font-size: 0.75rem; opacity: 0.7; margin-top: 0.2rem; text-transform: uppercase; }

        .portal-logout-btn { background: var(--color-secondary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        
        .placeholder {
            min-height: 80px;
            background-color: transparent; /* Más sutil */
            border: 1px dashed #444;
            display:flex; align-items:center; justify-content:center;
            border-radius: 8px; color: #666; font-style: italic;
            padding: 1rem;
        }

             /* --- ESTILOS PARA EL FORMULARIO DE INVITACIÓN --- */
        .invite-container {
            background-color: #1a1a1a;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            border-left: 3px solid var(--color-primary);
        }
        #invite-form {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        #invite-form input {
            flex-grow: 1;
            background: #2c2c2c;
            border: 1px solid #444;
            color: var(--color-text);
            padding: 0.6rem 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: var(--font-family);
        }
        #invite-form button {
            background: var(--color-primary);
            color: var(--color-text-dark);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <header>
        <div class="container header-container">
            <div class="logo">
                <img src="imagenes/logo.png" alt="Makumoto Logo">
                <span id="portal-sector-name">MAKUMOTO®</span>
            </div>
        </div>
    </header>

    <main id="manager-portal" class="container">
        <div class="portal-actions-bar">
            <button id="btn-logout" class="portal-logout-btn">Cerrar Sesión</button>
        </div>

        <h1 id="portal-title">Cargando...</h1>
        
        <section id="dashboard-kpis">
            <div class="kpi-grid">
                <!-- El JavaScript seguirá pintando el Pizarrón aquí -->
            </div>
        </section>
        
        <!-- === INICIO DE LA REINTEGRACIÓN ESTRUCTURAL === -->

        <section id="team-roster">
            <h2 id="roster-title" class="section-title">Miembros de la Tribu</h2>
            <div class="invite-container">
                <form id="invite-form">
                    <input type="email" id="invite-email" placeholder="correo@delnuevomiembro.com" required>
                    <button type="submit">Enviar Invitación</button>
                </form>
            </div>
            <div id="roster-container" class="placeholder">
                <!-- El Roster se activará en la Fase 2 -->
            </div>
        </section>

        <section id="power-up-arsenal" style="margin-top: 50px;">
            <h2 class="section-title">Arsenal Estratégico</h2>
            <div id="power-up-grid" class="placeholder">
                <!-- El Arsenal se activará en la Fase 2 -->
            </div>
        </section>

        <!-- Aquí se podrían añadir los demás contenedores vacíos si fuera necesario -->

    </main>

    <!-- SDKs de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- ===== CONFIGURACIÓN SEGURA DE FIREBASE (NO VERSIONADA) ===== -->
    <script src="js/firebase-config.js"></script>

    <!-- ===== NÚCLEO DEL PORTAL DE MANAGER (SIGUE SIENDO LA VERSIÓN MÍNIMA) ===== -->
    <script src="js/portal.js"></script>

</body>
</html>
